<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Demo – FUNK Records</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#f5f5f5;
color:#111;
}

section{
max-width:500px;
margin:5rem auto;
background:#fff;
padding:3rem;
border-radius:6px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:4px;
}

.btn{
margin-top:20px;
width:100%;
background:#111;
color:#fff;
padding:14px;
border:none;
font-weight:600;
cursor:pointer;
}

footer{
text-align:center;
font-size:.8rem;
padding:2rem;
color:#777;
}
</style>
</head>

<body>

<section>
<h2>Submit Your Demo</h2>
<p>We accept phonk, electronic & experimental music.</p>

<form action="https://formspree.io/f/mzzrkpqj" method="POST">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Demo link</label>
<input type="url" name="demo-link" required>

<label>Message</label>
<textarea name="message" rows="4" required></textarea>

<button class="btn">Send Demo</button>
</form>

<p><small>*Private streaming links only</small></p>
</section>

<footer>
© 2026 FUNK Records
</footer>

</body>
</html>
