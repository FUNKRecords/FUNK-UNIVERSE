<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Demo – FUNK Records</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#000;
color:#fff;
}

section{
max-width:500px;
margin:6rem auto;
padding:3rem;
background:rgba(255,255,255,.05);
border-radius:25px;
backdrop-filter:blur(20px);
box-shadow:0 0 80px rgba(255,255,255,.08);
}

h2{text-align:center;font-weight:800}

input,textarea{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#1a1a1a;
color:#fff;
}

input:focus,textarea:focus{
outline:2px solid #00bfff;
}

.btn{
width:100%;
margin-top:25px;
background:linear-gradient(135deg,#fff,#bfbfbf);
color:#000;
padding:16px;
border-radius:50px;
font-weight:800;
letter-spacing:.5px;
border:none;
box-shadow:0 0 50px rgba(255,255,255,.35);
transition:.3s;
}

.btn:hover{
transform:scale(1.07);
box-shadow:0 0 80px #00bfff;
}

footer{
text-align:center;
padding:2rem;
font-size:.8rem;
color:#aaa;
}
</style>
</head>

<body>

<section>
<h2>Submit Your Demo</h2>
<p>We accept Phonk, Lo-fi, Electronic & Experimental.</p>

<form action="https://formspree.io/f/mzzrkpqj" method="POST">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Demo Link</label>
<input type="url" name="demo-link" required>

<label>Message</label>
<textarea name="message" rows="4" required></textarea>

<button class="btn">Send Demo</button>
</form>

<p><small>*Private streaming links only.</small></p>
</section>

<footer>
<p>&copy; 2026 FUNK Records</p>
</footer>

</body>
  </html>
