<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="google-site-verification" content="aRJkK1v-RDq6Crn086kau5WQJN5hOikSnNif_sxnV_c" />
  <meta name="description" content="FUNK UNIVERSE — An independent record label." />
  <title>FUNK UNIVERSE</title>
  <style>
    /* ═══════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════ */
    :root {
      --ink:   #0a0a0a;
      --paper: #f2ede6;
      --red:   #b01c1c;
      --rule:  rgba(242,237,230,0.08);
      --font-display: Impact, 'Arial Black', Arial, sans-serif;
      --font-body:    Georgia, 'Times New Roman', serif;
      --font-mono:    'Courier New', Courier, monospace;
    }

    /* ═══════════════════════════════════════
       RESET
    ═══════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: var(--font-body);
      background: var(--ink);
      color: var(--paper);
      overflow-x: hidden;
      min-height: 100vh;
      width: 100%;
    }
    img, svg { display: block; max-width: 100%; }
    a { color: inherit; }

    /* ═══════════════════════════════════════
       GRAIN OVERLAY
    ═══════════════════════════════════════ */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 9000;
      animation: grain 0.15s steps(1) infinite;
    }
    @keyframes grain {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-2px,1px); }
      50%  { transform: translate(2px,-1px); }
      75%  { transform: translate(-1px,2px); }
    }

    /* ═══════════════════════════════════════
       SCANLINES
    ═══════════════════════════════════════ */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 8999;
    }

    /* ═══════════════════════════════════════
       CUSTOM CURSOR (desktop only)
    ═══════════════════════════════════════ */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--red);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s;
      opacity: 0;
      will-change: left, top;
    }
    @media (hover: hover) {
      body { cursor: crosshair; }
    }
    @media (hover: none) {
      .cursor { display: none; }
    }

    /* ═══════════════════════════════════════
       PARTICLES
    ═══════════════════════════════════════ */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(242,237,230,0.4);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) translateX(0);            opacity: 0; }
      8%   { opacity: 0.6; }
      92%  { opacity: 0.12; }
      100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
    }

    /* ═══════════════════════════════════════
       NAV
    ═══════════════════════════════════════ */
    nav.topnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.3rem 2.5rem;
      background: rgba(10,10,10,0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--rule);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      flex-shrink: 0;
    }
    .nav-logo-img {
      height: 38px;
      width: auto;
      display: block;
      /* Invert white bg to transparent-friendly on dark nav */
      filter: invert(1) brightness(1.1);
      transition: opacity 0.2s;
    }
    .nav-logo:hover .nav-logo-img { opacity: 0.75; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-link {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(242,237,230,0.45);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--paper); }

    /* HAMBURGER */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--paper);
      border-radius: 1px;
      transition: transform 0.35s ease, opacity 0.35s ease;
      transform-origin: center;
    }
    .hamburger.is-open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.is-open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.is-open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ═══════════════════════════════════════
       MOBILE DRAWER
    ═══════════════════════════════════════ */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 480;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .drawer-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: -320px;
      width: 260px;
      height: 100%;
      background: #0d0d0d;
      border-left: 1px solid var(--rule);
      z-index: 490;
      padding: 5.5rem 2.5rem 2.5rem;
      transition: right 0.42s cubic-bezier(0.77,0,0.18,1);
    }
    .drawer.is-open { right: 0; }

    .drawer ul { list-style: none; }
    .drawer li {
      padding: 1.1rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .drawer a {
      font-family: var(--font-display);
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--paper);
      text-decoration: none;
      opacity: 0.55;
      transition: opacity 0.2s;
      display: block;
    }
    .drawer a:hover,
    .drawer a:focus { opacity: 1; }

    /* ═══════════════════════════════════════
       HERO
    ═══════════════════════════════════════ */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8rem 2rem 5rem;
      overflow: hidden;
    }

    /* Background glow blob */
    .hero-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(520px, 85vw);
      height: min(520px, 85vw);
      background: radial-gradient(circle, rgba(176,28,28,0.13) 0%, transparent 68%);
      transform: translate(-50%, -50%);
      animation: glowPulse 5s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes glowPulse {
      0%,100% { transform: translate(-50%,-50%) scale(1);    opacity: 0.7; }
      50%      { transform: translate(-50%,-50%) scale(1.35); opacity: 1; }
    }

    /* Vinyl record background — REMOVED */

    /* Hero logo */
    .hero-logo-wrap {
      width: min(420px, 80vw);
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 1s 0.65s forwards;
    }
    .hero-logo {
      width: 100%;
      height: auto;
      display: block;
      /* White background is part of the PNG — mix-blend-mode removes it */
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 28px rgba(255,255,255,0.12))
              drop-shadow(0 0 8px rgba(176,28,28,0.3));
    }
    .corner {
      position: absolute;
      width: 22px; height: 22px;
      z-index: 2;
      animation: cornerBlink 3.5s ease-in-out infinite;
    }
    .c-tl { top:1.5rem; left:1.5rem;  border-top:1px solid rgba(242,237,230,0.18); border-left:1px solid rgba(242,237,230,0.18); }
    .c-tr { top:1.5rem; right:1.5rem; border-top:1px solid rgba(242,237,230,0.18); border-right:1px solid rgba(242,237,230,0.18); }
    .c-bl { bottom:1.5rem; left:1.5rem;  border-bottom:1px solid rgba(242,237,230,0.18); border-left:1px solid rgba(242,237,230,0.18); }
    .c-br { bottom:1.5rem; right:1.5rem; border-bottom:1px solid rgba(242,237,230,0.18); border-right:1px solid rgba(242,237,230,0.18); }
    /* Corner brackets */

    /* Hero content */
    .hero-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 100%;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.4s forwards;
    }

    .rec-dot {
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      flex-shrink: 0;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.05} }

    /* hero title replaced by logo image — see .hero-logo-wrap */

    .hero-rule {
      width: 1px;
      height: 50px;
      background: linear-gradient(to bottom, transparent, rgba(242,237,230,0.3), transparent);
      margin: 2.2rem auto;
      opacity: 0;
      animation: fadeUp 0.9s 0.95s forwards;
    }

    .hero-btn {
      display: inline-block;
      position: relative;
      overflow: hidden;
      font-family: var(--font-mono);
      font-size: 0.66rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--paper);
      text-decoration: none;
      padding: 1rem 2.4rem;
      transition: color 0.35s;
      opacity: 0;
      animation: fadeUp 0.9s 1.1s forwards;
      white-space: nowrap;
    }
    .hero-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--red);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.38s cubic-bezier(0.77,0,0.18,1);
    }
    .hero-btn:hover { color: var(--paper); }
    .hero-btn:hover::before { transform: scaleX(1); }
    .hero-btn span { position: relative; z-index: 1; }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════
       MARQUEE
    ═══════════════════════════════════════ */
    .marquee-wrap {
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      overflow: hidden;
      padding: 1.1rem 0;
      width: 100%;
    }
    .marquee-wrap:hover .marquee-track { animation-play-state: paused; }
    .marquee-track {
      display: flex;
      width: max-content;
      animation: slide 26s linear infinite;
    }
    @keyframes slide {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .marquee-item {
      font-family: var(--font-display);
      font-size: 0.55rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(242,237,230,0.18);
      padding: 0 3rem;
      white-space: nowrap;
    }
    .marquee-item.accent { color: var(--red); opacity: 0.9; }

    /* ═══════════════════════════════════════
       ANIMATED DIVIDER
    ═══════════════════════════════════════ */
    .live-rule {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--red), transparent);
      background-size: 300% 100%;
      animation: ruleMove 3.5s ease-in-out infinite;
      opacity: 0.5;
    }
    @keyframes ruleMove {
      0%   { background-position: -100% 0; }
      100% { background-position: 220% 0; }
    }

    /* ═══════════════════════════════════════
       ABOUT SECTION
    ═══════════════════════════════════════ */
    .about {
      max-width: 860px;
      margin: 0 auto;
      padding: 9rem 3rem;
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 5rem;
      align-items: start;
    }

    .about-index { position: sticky; top: 6rem; }

    .about-num {
      font-family: var(--font-display);
      font-size: 4.5rem;
      color: transparent;
      -webkit-text-stroke: 1px rgba(242,237,230,0.1);
      line-height: 1;
      display: block;
    }
    .about-tag {
      font-family: var(--font-mono);
      font-size: 0.56rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--red);
      display: block;
      margin-top: 0.5rem;
    }

    .about-body h2 {
      font-family: var(--font-body);
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      font-weight: 400;
      line-height: 1.25;
      color: var(--paper);
      margin-bottom: 2rem;
    }
    .about-body h2 em {
      font-style: italic;
      color: rgba(242,237,230,0.35);
    }
    .about-body p {
      font-size: 1rem;
      color: rgba(242,237,230,0.5);
      line-height: 1.95;
      margin-bottom: 1.4rem;
    }

    /* ═══════════════════════════════════════
       LEGAL SECTION
    ═══════════════════════════════════════ */
    .legal {
      border-top: 1px solid var(--rule);
      max-width: 860px;
      margin: 0 auto;
      padding: 6rem 3rem;
    }

    .legal-head {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .legal-head h2 {
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--paper);
      white-space: nowrap;
    }
    .legal-divider {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .legal-row {
      display: grid;
      grid-template-columns: 155px 1fr;
      gap: 2rem;
      padding: 1.4rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .legal-key {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      padding-top: 0.15rem;
    }
    .legal-val {
      font-family: var(--font-body);
      font-size: 1rem;
      color: rgba(242,237,230,0.5);
      line-height: 1.85;
    }

    /* ═══════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════ */
    .site-footer {
      border-top: 1px solid var(--rule);
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .footer-brand {
      font-family: var(--font-display);
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(242,237,230,0.28);
    }
    .footer-copy {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: rgba(242,237,230,0.18);
    }

    /* ═══════════════════════════════════════
       RESPONSIVE — TABLET
    ═══════════════════════════════════════ */
    @media (max-width: 760px) {
      .about {
        grid-template-columns: 1fr;
        gap: 2rem;
        padding: 6rem 2rem;
      }
      .about-index { position: static; }
      .legal { padding: 5rem 2rem; }
    }

    /* ═══════════════════════════════════════
       RESPONSIVE — MOBILE
    ═══════════════════════════════════════ */
    @media (max-width: 520px) {
      /* Nav */
      nav.topnav { padding: 1rem 1.2rem; }
      .nav-links .nav-link { display: none; }
      .hamburger { display: flex; }

      /* Hero */
      .hero {
        padding: 6rem 1.2rem 4rem;
        min-height: 100svh;
      }
      .hero-eyebrow {
        font-size: 0.52rem;
        letter-spacing: 0.25em;
        margin-bottom: 1.5rem;
      }
      .hero-logo-wrap { width: min(320px, 78vw); }
      .hero-rule { height: 38px; margin: 1.6rem auto; }
      .hero-btn {
        font-size: 0.58rem;
        letter-spacing: 0.2em;
        padding: 0.9rem 1.8rem;
      }

      /* About / Legal */
      .about { padding: 5rem 1.2rem; }
      .legal  { padding: 4rem 1.2rem; }
      .legal-row {
        grid-template-columns: 1fr;
        gap: 0.35rem;
      }

      /* Footer */
      .site-footer {
        padding: 1.5rem 1.2rem;
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

<!-- Fixed overlays -->
<div class="scanlines"  aria-hidden="true"></div>
<div class="cursor"     id="cursor"    aria-hidden="true"></div>
<div class="particles"  id="particles" aria-hidden="true"></div>

<!-- ══════════════════════════════
     NAV

<!-- ══════════════════════════════
     MOBILE DRAWER

<div class="drawer-overlay" id="overlay" aria-hidden="true"></div>

  <ul>

<!-- ══════════════════════════════
     MARQUEE
══════════════════════════════ -->
<div class="marquee-wrap" aria-hidden="true">
  <div class="marquee-track">
    <span class="marquee-item accent">Funk Universe</span>
    <span class="marquee-item">Independent Record Label</span>
    <span class="marquee-item">Submit Your Demo</span>
    <span class="marquee-item accent">Funk Universe</span>
    <span class="marquee-item">Independen
