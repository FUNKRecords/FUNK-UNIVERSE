<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="aRJkK1v-RDq6Crn086kau5WQJN5hOikSnNif_sxnV_c" />
  <meta name="description" content="FUNK UNIVERSE — An independent record label." />
  <title>FUNK UNIVERSE</title>
  <style>

    /* ══════════════════════════════════════
       TOKENS
    ══════════════════════════════════════ */
    :root {
      --ink:   #0a0a0a;
      --paper: #f2ede6;
      --red:   #b01c1c;
      --rule:  rgba(242,237,230,0.08);
      --font-display: Impact, 'Arial Black', Arial, sans-serif;
      --font-body:    Georgia, 'Times New Roman', serif;
      --font-mono:    'Courier New', Courier, monospace;
    }

    /* ══════════════════════════════════════
       BASE RESET
    ══════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
      /* CRITICAL: never lock scroll on html */
      overflow-x: hidden;
    }

    body {
      font-family: var(--font-body);
      background: var(--ink);
      color: var(--paper);
      /* CRITICAL: only hide horizontal overflow, never vertical */
      overflow-x: hidden;
      overflow-y: auto;
      min-height: 100vh;
      width: 100%;
      -webkit-overflow-scrolling: touch;
    }

    img { display: block; max-width: 100%; height: auto; }
    a   { color: inherit; text-decoration: none; }

    /* ══════════════════════════════════════
       GRAIN OVERLAY
    ══════════════════════════════════════ */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 9000;
      animation: grain 0.15s steps(1) infinite;
    }
    @keyframes grain {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-2px,1px); }
      50%  { transform: translate(2px,-1px); }
      75%  { transform: translate(-1px,2px); }
    }

    /* ══════════════════════════════════════
       SCANLINES
    ══════════════════════════════════════ */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 8999;
    }

    /* ══════════════════════════════════════
       CURSOR (desktop only)
    ══════════════════════════════════════ */
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--red);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      transition: width 0.2s, height 0.2s;
      opacity: 0;
    }
    @media (hover: hover) { body { cursor: crosshair; } }
    @media (hover: none)  { .cursor { display: none; } }

    /* ══════════════════════════════════════
       PARTICLES
    ══════════════════════════════════════ */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(242,237,230,0.35);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) translateX(0);            opacity: 0; }
      8%   { opacity: 0.5; }
      92%  { opacity: 0.1; }
      100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
    }

    /* ══════════════════════════════════════
       NAV
    ══════════════════════════════════════ */
    .topnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 2rem;
      background: rgba(10,10,10,0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--rule);
    }

    /* Logo in nav */
    .nav-logo-img {
      height: 42px;
      width: auto;
      display: block;
      mix-blend-mode: screen;
      filter: brightness(1.1);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-link {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(242,237,230,0.45);
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--paper); }

    /* ══════════════════════════════════════
       HAMBURGER BUTTON
    ══════════════════════════════════════ */
    .hamburger {
      /* Always in DOM, shown/hidden via CSS */
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--paper);
      border-radius: 1px;
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform-origin: center;
      pointer-events: none;
    }
    /* X state */
    .hamburger.is-open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.is-open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.is-open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* Show hamburger on mobile */
    @media (max-width: 600px) {
      .nav-links .nav-link { display: none; }
      .hamburger { display: flex; }
    }

    /* ══════════════════════════════════════
       MOBILE DRAWER
    ══════════════════════════════════════ */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 480;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .drawer-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      /* start WAY off screen — wider than 260px to be safe */
      right: -320px;
      width: 260px;
      height: 100%;
      background: #0e0e0e;
      border-left: 1px solid var(--rule);
      z-index: 490;
      padding: 5rem 2.2rem 2.5rem;
      transition: right 0.4s cubic-bezier(0.77,0,0.18,1);
      /* Never let drawer itself scroll-lock the page */
      overflow-y: auto;
    }
    .drawer.is-open { right: 0; }

    .drawer ul { list-style: none; }
    .drawer li {
      padding: 1.1rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .drawer a {
      font-family: var(--font-display);
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(242,237,230,0.55);
      display: block;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .drawer a:hover,
    .drawer a:active { color: var(--paper); }

    /* ══════════════════════════════════════
       HERO
    ══════════════════════════════════════ */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7rem 1.5rem 5rem;
      /* CRITICAL: clip decorative elements but don't break scroll
         Use clip-path instead of overflow:hidden so touch events pass through */
      overflow: clip;
    }

    /* Glow blob */
    .hero-glow {
      position: absolute;
      top: 50%; left: 50%;
      width: min(480px, 85vw);
      height: min(480px, 85vw);
      background: radial-gradient(circle, rgba(176,28,28,0.15) 0%, transparent 68%);
      transform: translate(-50%,-50%);
      animation: glowPulse 5s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes glowPulse {
      0%,100% { transform: translate(-50%,-50%) scale(1);    opacity: 0.7; }
      50%      { transform: translate(-50%,-50%) scale(1.3);  opacity: 1; }
    }

    /* Corner brackets */
    .corner {
      position: absolute;
      width: 20px; height: 20px;
      z-index: 2;
      pointer-events: none;
      animation: cBlink 3.5s ease-in-out infinite;
    }
    .c-tl { top:1.5rem;    left:1.5rem;  border-top:1px solid rgba(242,237,230,0.15); border-left:1px solid rgba(242,237,230,0.15); }
    .c-tr { top:1.5rem;    right:1.5rem; border-top:1px solid rgba(242,237,230,0.15); border-right:1px solid rgba(242,237,230,0.15); }
    .c-bl { bottom:1.5rem; left:1.5rem;  border-bottom:1px solid rgba(242,237,230,0.15); border-left:1px solid rgba(242,237,230,0.15); }
    .c-br { bottom:1.5rem; right:1.5rem; border-bottom:1px solid rgba(242,237,230,0.15); border-right:1px solid rgba(242,237,230,0.15); }
    @keyframes cBlink { 0%,100%{opacity:0.1} 50%{opacity:0.45} }

    /* Hero inner stack */
    .hero-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* Eyebrow label */
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.4s forwards;
    }
    .rec-dot {
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      flex-shrink: 0;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.05} }

    /* LOGO IMAGE */
    .hero-logo-wrap {
      width: min(400px, 82vw);
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 1s 0.65s forwards;
    }
    .hero-logo {
      width: 100%;
      height: auto;
      display: block;
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 30px rgba(255,255,255,0.1))
              drop-shadow(0 0 10px rgba(176,28,28,0.25));
    }

    /* Thin vertical rule */
    .hero-rule {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, rgba(242,237,230,0.28), transparent);
      margin: 2rem auto;
      opacity: 0;
      animation: fadeUp 0.9s 0.95s forwards;
    }

    /* CTA button */
    .hero-btn {
      display: inline-block;
      position: relative;
      overflow: hidden;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--paper);
      padding: 1rem 2.4rem;
      transition: color 0.35s;
      opacity: 0;
      animation: fadeUp 0.9s 1.1s forwards;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .hero-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--red);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.36s cubic-bezier(0.77,0,0.18,1);
    }
    .hero-btn:hover  { color: var(--paper); }
    .hero-btn:hover::before { transform: scaleX(1); }
    .hero-btn span   { position: relative; z-index: 1; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ══════════════════════════════════════
       MARQUEE
    ══════════════════════════════════════ */
    .marquee-wrap {
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      overflow: hidden;
      padding: 1rem 0;
      width: 100%;
    }
    .marquee-wrap:hover .marquee-track { animation-play-state: paused; }
    .marquee-track {
      display: flex;
      width: max-content;
      animation: marqueeSlide 26s linear infinite;
    }
    @keyframes marqueeSlide {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .marquee-item {
      font-family: var(--font-display);
      font-size: 0.54rem;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: rgba(242,237,230,0.17);
      padding: 0 2.8rem;
      white-space: nowrap;
    }
    .marquee-item.accent { color: var(--red); opacity: 0.9; }

    /* ══════════════════════════════════════
       ANIMATED RULE
    ══════════════════════════════════════ */
    .live-rule {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--red), transparent);
      background-size: 300% 100%;
      animation: ruleAnim 3.5s ease-in-out infinite;
      opacity: 0.45;
    }
    @keyframes ruleAnim {
      0%   { background-position: -100% 0; }
      100% { background-position: 220% 0; }
    }

    /* ══════════════════════════════════════
       ABOUT
    ══════════════════════════════════════ */
    .about {
      max-width: 860px;
      margin: 0 auto;
      padding: 9rem 3rem;
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 5rem;
      align-items: start;
    }
    .about-index { position: sticky; top: 6rem; }
    .about-num {
      font-family: var(--font-display);
      font-size: 4.5rem;
      color: transparent;
      -webkit-text-stroke: 1px rgba(242,237,230,0.1);
      line-height: 1;
      display: block;
    }
    .about-tag {
      font-family: var(--font-mono);
      font-size: 0.56rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--red);
      display: block;
      margin-top: 0.5rem;
    }
    .about-body h2 {
      font-family: var(--font-body);
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      font-weight: 400;
      line-height: 1.25;
      color: var(--paper);
      margin-bottom: 2rem;
    }
    .about-body h2 em {
      font-style: italic;
      color: rgba(242,237,230,0.35);
    }
    .about-body p {
      font-size: 1rem;
      color: rgba(242,237,230,0.5);
      line-height: 1.9;
      margin-bottom: 1.4rem;
    }

    /* ══════════════════════════════════════
       LEGAL
    ══════════════════════════════════════ */
    .legal {
      border-top: 1px solid var(--rule);
      max-width: 860px;
      margin: 0 auto;
      padding: 6rem 3rem;
    }
    .legal-head {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .legal-head h2 {
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--paper);
      white-space: nowrap;
    }
    .legal-divider { flex: 1; height: 1px; background: var(--rule); }

    .legal-row {
      display: grid;
      grid-template-columns: 155px 1fr;
      gap: 2rem;
      padding: 1.4rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .legal-key {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      padding-top: 0.15rem;
    }
    .legal-val {
      font-family: var(--font-body);
      font-size: 1rem;
      color: rgba(242,237,230,0.5);
      line-height: 1.85;
    }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    .site-footer {
      border-top: 1px solid var(--rule);
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .footer-brand {
      font-family: var(--font-display);
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(242,237,230,0.26);
    }
    .footer-copy {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: rgba(242,237,230,0.16);
    }

    /* ══════════════════════════════════════
       TABLET
    ══════════════════════════════════════ */
    @media (max-width: 760px) {
      .about {
        grid-template-columns: 1fr;
        gap: 2rem;
        padding: 6rem 2rem;
      }
      .about-index { position: static; }
      .legal { padding: 5rem 2rem; }
    }

    /* ══════════════════════════════════════
       MOBILE
    ══════════════════════════════════════ */
    @media (max-width: 520px) {
      .topnav { padding: 0.7rem 1rem; }

      .hero {
        padding: 5.5rem 1rem 4rem;
        min-height: 100svh;
      }
      .hero-eyebrow {
        font-size: 0.5rem;
        letter-spacing: 0.24em;
        margin-bottom: 1.4rem;
      }
      .hero-logo-wrap { width: min(320px, 84vw); }
      .hero-rule  { height: 36px; margin: 1.6rem auto; }
      .hero-btn   { font-size: 0.58rem; padding: 0.85rem 1.6rem; letter-spacing: 0.18em; }

      .about  { padding: 5rem 1.2rem; }
      .legal  { padding: 4rem 1.2rem; }
      .legal-row { grid-template-columns: 1fr; gap: 0.3rem; }

      .site-footer {
        padding: 1.5rem 1.2rem;
        flex-direction: column;
        align-items: flex-start;
      }
    }

  </style>
</head>
<body>

<div class="scanlines"  aria-hidden="true"></div>
<div class="cursor"     id="cursor"    aria-hidden="true"></div>
<div class="particles"  id="particles" aria-hidden="true"></div>

<!-- ════════════════════════
     NAV
════════════════════════ -->
<nav class="topnav" role="navigation" aria-label="Main navigation">
  <a href="#home" aria-label="Funk Universe home">
    <img src="logo.png" alt="Funk Universe" class="nav-logo-img" />
  </a>
  <div class="nav-links">
    <a href="#about" class="nav-link">Label</a>
    <a href="#legal" class="nav-link">Legal</a>
    <a href="submit-demo.html" class="nav-link">Demo</a>
    <button
      class="hamburger"
      id="ham"
      aria-label="Open navigation menu"
      aria-expanded="false"
      aria-controls="drawer"
      type="button"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

<!-- ════════════════════════
     DRAWER
════════════════════════ -->
<div
  class="drawer-overlay"
  id="overlay"
  role="presentation"
  aria-hidden="true"
></div>

<div class="drawer" id="drawer" role="dialog" aria-label="Navigation menu" aria-hidden="true">
  <ul>
    <li><a href="#about"           id="dl-label">Label</a></li>
    <li><a href="#legal"           id="dl-legal">Legal</a></li>
    <li><a href="submit-demo.html" id="dl-demo" >Submit Demo</a></li>
  </ul>
</div>

<!-- ════════════════════════
     HERO
════════════════════════ -->
<section class="hero" id="home">
  <div class="corner c-tl" aria-hidden="true"></div>
  <div class="corner c-tr" aria-hidden="true"></div>
  <div class="corner c-bl" aria-hidden="true"></div>
  <div class="corner c-br" aria-hidden="true"></div>

  <div class="hero-glow" aria-hidden="true"></div>

  <div class="hero-inner">
    <span class="hero-eyebrow">
      <span class="rec-dot" aria-hidden="true"></span>
      An independent record label
    </span>

    <div class="hero-logo-wrap">
      <img src="logo.png" alt="FUNK UNIVERSE" class="hero-logo" />
    </div>

    <div class="hero-rule" aria-hidden="true"></div>

    <a href="submit-demo.html" class="hero-btn">
      <span>Submit Your Demo</span>
    </a>
  </div>
</section>

<!-- ════════════════════════
     MARQUEE
════════════════════════ -->
<div class="marquee-wrap" aria-hidden="true">
  <div class="marquee-track">
    <span class="marquee-item accent">Funk Universe</span>
    <span class="
