  <title>FUNK UNIVERSE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --ink: #0a0a0a;
      --paper: #f2ede6;
      --warm: #e8e0d4;
      --red: #b01c1c;
      --red-dim: rgba(176,28,28,0.15);
      --rule: rgba(242,237,230,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--ink);
      color: var(--paper);
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* \u2500\u2500 GRAIN \u2500\u2500 */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.055;
      pointer-events: none;
      z-index: 9998;
      animation: grainShift 0.12s steps(1) infinite;
    }

    @keyframes grainShift {
      0%   { transform: translate(0,0); }
      20%  { transform: translate(-2px, 1px); }
      40%  { transform: translate(2px, -1px); }
      60%  { transform: translate(-1px, 2px); }
      80%  { transform: translate(1px, -2px); }
      100% { transform: translate(0,0); }
    }

    /* \u2500\u2500 SCANLINES \u2500\u2500 */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 9997;
    }

    /* \u2500\u2500 CURSOR DOT \u2500\u2500 */
    .cursor {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--red);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, opacity 0.2s;
      mix-blend-mode: difference;
    }

    /* \u2500\u2500 NAV \u2500\u2500 */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.6rem 3rem;
      mix-blend-mode: difference;
    }

    .nav-mark {
      font-family: 'Syncopate', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--paper);
      text-decoration: none;
      text-transform: uppercase;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }

    .nav-link {
      font-family: 'Courier Prime', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--paper);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .nav-link:hover { opacity: 1; }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: crosshair;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1px;
      background: var(--paper);
      transition: all 0.35s ease;
      transform-origin: center;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* \u2500\u2500 MOBILE DRAWER \u2500\u2500 */
    .drawer {
      position: fixed;
      top: 0; right: -100%;
      width: 260px; height: 100vh;
      background: #0f0f0f;
      border-left: 1px solid var(--rule);
      z-index: 490;
      padding: 6rem 2.5rem 2.5rem;
      transition: right 0.5s cubic-bezier(0.77,0,0.18,1);
    }

    .drawer.open { right: 0; }

    .drawer-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 480;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }

    .drawer-bg.open { opacity: 1; pointer-events: all; }

    .drawer ul { list-style: none; }
    .drawer li { padding: 1.1rem 0; border-bottom: 1px solid var(--rule); }
    .drawer a {
      font-family: 'Syncopate', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--paper);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .drawer a:hover { opacity: 1; }

    /* \u2500\u2500 HERO \u2500\u2500 */
    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      padding: 0 2rem;
    }

    /* Background animated vinyl */
    .vinyl {
      position: absolute;
      width: 80vmin;
      height: 80vmin;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      animation: vinylSpin 18s linear infinite;
      opacity: 0.06;
    }

    .vinyl-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--paper);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes vinylSpin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Pulsing center hole */
    .vinyl-hole {
      position: absolute;
      width: 8%;
      height: 8%;
      background: var(--ink);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 1px rgba(242,237,230,0.3);
    }

    /* Hero text */
    .hero-inner {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .hero-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--red);
